services:
  postgres:
    image: postgres:16-alpine
    container_name: post-pilot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: post_pilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: post-pilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.api
    container_name: post-pilot-api
    working_dir: /workspace
    command: ["air", "-c", "deployments/docker/.air.api.toml"]
    environment:
      APP_PORT: "8080"
      APP_BASE_URL: http://localhost:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: post_pilot
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      JWT_ACCESS_SECRET_KEY: change-me-access-secret-min-32-bytes-long
      JWT_REFRESH_SECRET_KEY: change-me-refresh-secret-min-32-bytes-long
      JWT_EXPIRY: "3600"
      JWT_REFRESH_EXPIRY: "604800"
      BCRYPT_COST: "12"
      AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
      AUTH_LOGIN_RATE_LIMIT_MAX: "10"
      AUTH_REGISTER_RATE_LIMIT_MAX: "5"
      AUTH_REFRESH_RATE_LIMIT_MAX: "20"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.web
    container_name: post-pilot-web
    working_dir: /workspace/apps/web
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web:/workspace/apps/web
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  migrator:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.migrator
    container_name: post-pilot-migrator
    working_dir: /workspace
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: post_pilot
      DB_SSLMODE: disable
      MIGRATIONS_PATH: packages/database/migrations
      ALLOW_DESTRUCTIVE_MIGRATIONS: "false"
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["go", "run", "./apps/migrator/cmd/migrator"]
    command: ["-command", "up"]
    profiles: ["tools"]

  swagger:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.api
    container_name: post-pilot-swagger
    working_dir: /workspace
    command: ["sh", "-c", "chmod +x scripts/swagger.sh && ./scripts/swagger.sh"]
    environment:
      SWAGGER_BASE_URL: http://localhost:8080
    volumes:
      - ../..:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    profiles: ["tools"]

volumes:
  postgres_data:
  redis_data:
  go_mod_cache:
  go_build_cache:
  web_node_modules:
